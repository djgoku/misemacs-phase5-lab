[tools]
erlang = "29"
elixir = "1.20.0-otp-29"
pixi   = "0.70.2"   # EXACT pin (not "latest"): deterministic toolchain_hash; no cold-cache lock churn

[plugins]
# Canonical local-first pixi path (identical in CI). NOT load-bearing: direct `pixi`/`pixi run`
# is the documented fallback (same pixi.lock). See spec §6.1/§6.4.
pixi-env  = "https://github.com/esteve/mise-env-pixi"      # activates a per-version pixi PROJECT (the `_.pixi-env` env directive)
vfox-pixi = "https://github.com/esteve/mise-backend-pixi"  # backend: `mise use vfox-pixi:<tool>` for ad-hoc conda tools (MUST be vfox-pixi, NOT pixi)

# Shared task seam: local dev, pregate (.pregate/linux.sh), and GitHub CI all invoke
# `mise run test` / `mise run lint` — one definition, three environments. `dir` is relative
# to this file's dir (repo root), so tasks run in orchestrator/ regardless of invocation cwd.
[tasks.test]
dir = "orchestrator"
run = "mix deps.get && mix test --warnings-as-errors"

[tasks.lint]
dir = "orchestrator"
run = "mix format --check-formatted"

[tasks.fmt]
dir = "orchestrator"
run = "mix format"

[tasks.configure-check]
description = "Phase 1: fetch Emacs + ./configure against the per-version pixi env; assert feature detection (configure-only); args: [version] (default master)"
run = "bash scripts/configure-check.sh"

[tasks.build]
description = "Phase 2: build a relocatable-candidate GUI Emacs.app from the per-version pixi env; args: [version] (default master)"
run = "bash pipeline/build-emacs"

[tasks.relocate]
description = "Phase 2: bundle + relocate the built Emacs.app into a self-contained app (Elixir; otool gate); args: [version] (default master)"
run = "bash pipeline/relocate"

[tasks.stage-enchant]
description = "Phase 2: copy the bundled enchant payload into the built Emacs.app (run AFTER build, BEFORE relocate); args: [version] (default master)"
run = "bash pipeline/stage-enchant"

[tasks.package]
description = "Phase 4: package build/<v>/Emacs.app into dist/<v>/ (xattr-free tar + SHASUMS256.txt + self-verify); args: <version> <tag> [--upstream-sha <sha>]"
run = "bash pipeline/package"

[tasks.publish]
description = "Phase 4: create a GitHub release (--latest=false) with asset+SHASUMS; args: --repo <owner/repo> [--version v]"
run = "bash pipeline/publish"

[tasks.promote]
description = "Phase 4: attach build-manifest.json + flip Latest (lab-only until Phase 5); args: --repo <owner/repo> --tag <tag>"
run = "bash pipeline/promote"

[tasks.e2e]
description = "Phase 4 DoD: clean pregate-VM install via mise/aqua; args: <owner/repo> <tag> <registry-url>"
run = "bash scripts/e2e-aqua-install.sh"

# Phase 2 no-pixi proof: move the per-version pixi env aside, then launch the relocated app. If the
# bundle is truly self-contained it resolves its whole dylib closure from Contents/Frameworks alone.
# pregate (.pregate/macos.sh) runs this inside its fresh disposable macOS VM; restored via trap.
[tasks.cleanroom]
description = "Phase 2 DoD: prove the relocated app runs with the pixi env moved aside (no-pixi launch); args: [version] (default master)"
run = '''
set -euo pipefail
VERSION="{{arg(name='version', default='master')}}"
APP="build/$VERSION/Emacs.app"
ENV_DIR="versions/$VERSION/.pixi"
[ -d "$APP" ] || { echo "FATAL: $APP missing — run 'mise run build && mise run relocate' first"; exit 1; }
ASIDE="$(mktemp -d)/pixi"
restore() { [ -d "$ASIDE" ] && mv "$ASIDE" "$ENV_DIR"; }
trap restore EXIT
[ -d "$ENV_DIR" ] && mv "$ENV_DIR" "$ASIDE"
echo ">> [1] --batch (dyld must resolve the full bundled closure with the pixi env gone) — THE gate"
"$APP/Contents/MacOS/Emacs" --batch --eval '(princ (format "ok %s\n" emacs-version))'
echo ">> [2] GUI frame smoke (NS path; needs a display/session — best-effort)"
if "$APP/Contents/MacOS/Emacs" -Q --eval '(run-with-timer 1 nil (lambda () (kill-emacs 0)))' 2>/dev/null; then
  echo "   GUI frame OK"
else
  echo "   GUI frame skipped (no display/session — --batch is the hard gate)"
fi
ENCH="$APP/Contents/Resources/enchant"
if [ -d "$ENCH" ]; then
  echo ">> [3] enchant resolves providers from the bundle alone (dladdr self-relocation, no pixi env)"
  lsmod="$("$ENCH/bin/enchant-lsmod-2")"; echo "$lsmod"   # set -e fails the gate if it crashes
  echo "$lsmod" | grep -qi applespell \
    || { echo "FATAL: applespell provider not listed from the bundle (O6)"; exit 1; }
  echo ">> [4] applespell default: enchant-2 -l -d en_US must NOT crash (needs staged AppleSpell.config)"
  printf 'helllo\n' | "$ENCH/bin/enchant-2" -l -d en_US >/dev/null   # set -e/pipefail fail the gate on the old SEGFAULT
  echo "   enchant-2 -d en_US OK"
  echo ">> [5] hunspell option: bundled en_US dict spell-checks via XDG_DATA_DIRS (no system enchant)"
  hs="$(printf 'teh\n' | env XDG_DATA_DIRS="$ENCH/share" ENCHANT_ORDERING='*:hunspell' "$ENCH/bin/enchant-2" -l -d en_US)"
  [ "$hs" = "teh" ] || { echo "FATAL: bundled hunspell en_US dict not working (got '$hs')"; exit 1; }
  echo "   hunspell en_US OK"
  echo ">> [6] symlinked-launch (O9): dladdr resolves providers under a symlink"
  LN="$(mktemp -d)/Emacs.app"; ln -s "$(cd "$(dirname "$APP")" && pwd)/$(basename "$APP")" "$LN"   # absolute target
  "$LN/Contents/Resources/enchant/bin/enchant-lsmod-2" >/dev/null \
    || { echo "FATAL: providers do not resolve under a symlinked launch (O9)"; exit 1; }
  echo "   symlinked launch OK"
  # [7] is best-effort BY DESIGN: it needs network (ELPA) + Xcode CLT, which the cleanroom VM may
  # lack, so 2>/dev/null + the else-branch downgrade it to "skipped" — it can never fail the gate.
  # The hard enchant gates are [3] (providers) + [4] (en_US no crash) + [5] (hunspell dict).
  echo ">> [7] jinx end-to-end (best-effort: needs network for ELPA + Xcode CLT)"
  if "$APP/Contents/MacOS/Emacs" -Q --batch \
       --eval "(progn (setq package-user-dir (make-temp-file \"elpa\" t))
                      (require 'package)
                      (add-to-list 'package-archives '(\"gnu\" . \"https://elpa.gnu.org/packages/\"))
                      (add-to-list 'package-archives '(\"nongnu\" . \"https://elpa.nongnu.org/nongnu/\"))
                      (package-initialize) (package-refresh-contents)
                      (package-install 'jinx)
                      (load (expand-file-name \"Contents/Resources/site-lisp/site-start.el\" \"$APP\"))
                      (require 'jinx)
                      (unless (fboundp 'jinx--load-module) (error \"O4: jinx--load-module missing — re-confirm advice target\"))
                      (with-temp-buffer (jinx-mode 1) (insert \"helllo\") (jinx--load-module) (message \"jinx ok\")))" 2>/dev/null; then
    echo "   jinx e2e OK (module compiled via bundled shim, no system pkg-config)"
  else
    echo "   jinx e2e skipped (no network/CLT — providers [3] + en_US [4] are the hard enchant gates)"
  fi
fi
echo ">> cleanroom: PASS — relocated app runs with no pixi env present"
'''

[tasks.decide]
description = "Phase 5: emit the dynamic build matrix + gate flags; args: --repo <owner/repo> --date <YYYY-MM-DD> --mode <detect|force|dry-run> [--force-version <name>]"
dir = "orchestrator"
run = "mix orchestrate.decide"

[tasks.finalize]
description = "Phase 5: merge per-cell manifest fragments + pick latest; args: --repo <owner/repo> --fragments <dir> --out <path>"
dir = "orchestrator"
run = "mix orchestrate.finalize"
